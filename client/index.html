<!doctype html>
<html lang="zh-Hans">
  <head>
    <meta charset="UTF-8" />

    <!-- PWA / Standalone (iPad Add to Home Screen) -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="智能家居" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#101e24" />

    <!-- Viewport: scale=1, no user scaling (kiosk-style) -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover"
    />

    <link rel="icon" type="image/png" href="/favicon.png" />
    <title>HomeOS - 智能家居系统</title>

    <!-- Remove tap highlight on iOS -->
    <style>
      * {
        -webkit-tap-highlight-color: transparent;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #0d1117;
      }
    </style>
    <script type="module" crossorigin src="/assets/index.js"></script>
    <link rel="modulepreload" crossorigin href="/assets/auth.js" />
    <link rel="stylesheet" crossorigin href="/assets/index.css" />
  </head>

  <body>
    <div id="app"></div>
  </body>
</html>
